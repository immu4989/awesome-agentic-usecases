<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="528" viewBox="0 0 1200 528" role="img" aria-label="Decision rules in precedence order for Release QC Triage Agent">
<rect x="1" y="1" width="1198" height="526" rx="14" fill="#1a1a19" stroke="rgba(255,255,255,0.10)"/>
<g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
<text x="44" y="46" font-size="19" font-weight="700" fill="#ffffff">How the decision is made</text>
<text x="44" y="70" font-size="13" fill="#898781">gates are evaluated in order — the first one that matches wins · <tspan fill="#e87ba4" font-weight="700">accent = a trap</tspan>, where the obvious reading is wrong</text>
<path d="M 66 122 V 164" stroke="#383835" stroke-width="1.5"/>
<text x="76" y="158" font-size="11" fill="#898781">no</text>
<circle cx="66" cy="104" r="15" fill="#e87ba4" stroke="#e87ba4" stroke-width="1.5"/>
<text x="66" y="109" font-size="14" font-weight="700" text-anchor="middle" fill="#ffffff">1</text>
<rect x="104" y="83" width="610" height="42" rx="8" fill="#e87ba41a" stroke="#e87ba4" stroke-width="1.5"/>
<text x="122" y="109" font-size="15" fill="#ffffff">🪤  Creative annotation covers the flagged range?</text>
<path d="M 722 104 H 748" stroke="#383835" stroke-width="1.5"/>
<path d="M 748 104 l -7 -4 v 8 z" fill="#383835"/>
<rect x="762" y="87" width="394" height="34" rx="17" fill="#2c2c2a"/>
<text x="782" y="109" font-size="14" font-weight="600" fill="#ffffff">no defect — release</text>
<path d="M 66 200 V 242" stroke="#383835" stroke-width="1.5"/>
<text x="76" y="236" font-size="11" fill="#898781">no</text>
<circle cx="66" cy="182" r="15" fill="#e87ba4" stroke="#e87ba4" stroke-width="1.5"/>
<text x="66" y="187" font-size="14" font-weight="700" text-anchor="middle" fill="#ffffff">2</text>
<rect x="104" y="161" width="610" height="42" rx="8" fill="#e87ba41a" stroke="#e87ba4" stroke-width="1.5"/>
<text x="122" y="187" font-size="15" fill="#ffffff">🪤  Caption defect in a CVAA territory?</text>
<path d="M 722 182 H 748" stroke="#383835" stroke-width="1.5"/>
<path d="M 748 182 l -7 -4 v 8 z" fill="#383835"/>
<rect x="762" y="165" width="394" height="34" rx="17" fill="#2c2c2a"/>
<text x="782" y="187" font-size="14" font-weight="600" fill="#ffffff">fix or delay — never waive</text>
<path d="M 66 278 V 320" stroke="#383835" stroke-width="1.5"/>
<text x="76" y="314" font-size="11" fill="#898781">no</text>
<circle cx="66" cy="260" r="15" fill="#1a1a19" stroke="#383835" stroke-width="1.5"/>
<text x="66" y="265" font-size="14" font-weight="700" text-anchor="middle" fill="#c3c2b7">3</text>
<rect x="104" y="239" width="610" height="42" rx="8" fill="none" stroke="#383835" stroke-width="1.5"/>
<text x="122" y="265" font-size="15" fill="#ffffff">Minor severity?</text>
<path d="M 722 260 H 748" stroke="#383835" stroke-width="1.5"/>
<path d="M 748 260 l -7 -4 v 8 z" fill="#383835"/>
<rect x="762" y="243" width="394" height="34" rx="17" fill="#2c2c2a"/>
<text x="782" y="265" font-size="14" font-weight="600" fill="#ffffff">ship inside the window, else vendor</text>
<path d="M 66 356 V 398" stroke="#383835" stroke-width="1.5"/>
<text x="76" y="392" font-size="11" fill="#898781">no</text>
<circle cx="66" cy="338" r="15" fill="#1a1a19" stroke="#383835" stroke-width="1.5"/>
<text x="66" y="343" font-size="14" font-weight="700" text-anchor="middle" fill="#c3c2b7">4</text>
<rect x="104" y="317" width="610" height="42" rx="8" fill="none" stroke="#383835" stroke-width="1.5"/>
<text x="122" y="343" font-size="15" fill="#ffffff">Fixable in house with time to spare?</text>
<path d="M 722 338 H 748" stroke="#383835" stroke-width="1.5"/>
<path d="M 748 338 l -7 -4 v 8 z" fill="#383835"/>
<rect x="762" y="321" width="394" height="34" rx="17" fill="#2c2c2a"/>
<text x="782" y="343" font-size="14" font-weight="600" fill="#ffffff">expedite internal fix</text>
<circle cx="66" cy="416" r="15" fill="#1a1a19" stroke="#383835" stroke-width="1.5"/>
<text x="66" y="421" font-size="14" font-weight="700" text-anchor="middle" fill="#c3c2b7">5</text>
<rect x="104" y="395" width="610" height="42" rx="8" fill="none" stroke="#383835" stroke-width="1.5"/>
<text x="122" y="421" font-size="15" fill="#ffffff">Otherwise</text>
<path d="M 722 416 H 748" stroke="#383835" stroke-width="1.5"/>
<path d="M 748 416 l -7 -4 v 8 z" fill="#383835"/>
<rect x="762" y="399" width="394" height="34" rx="17" fill="#2c2c2a"/>
<text x="782" y="421" font-size="14" font-weight="600" fill="#ffffff">vendor, delay, or release board</text>
</g>
</svg>
