name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  use-case:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dir: logistics-supply-chain/exception-triage-agent
            cli: exception-triage-agent
            seed: 7
          - dir: retail-workforce/shift-coverage-triage-agent
            cli: shift-coverage-agent
            seed: 11
          - dir: security-operations/alert-triage-agent
            cli: alert-triage-agent
            seed: 13
          - dir: security-operations/artifact-admission-agent
            cli: artifact-admission-agent
            seed: 31
          - dir: financial-services-fraud/fraud-alert-triage-agent
            cli: fraud-alert-triage-agent
            seed: 17
          - dir: media-streaming/release-qc-triage-agent
            cli: release-qc-agent
            seed: 19
          - dir: customer-support/refund-resolution-agent
            cli: refund-resolution-agent
            seed: 23
          - dir: it-operations/oncall-watch-agent
            cli: oncall-watch-agent
            seed: 29
          - dir: customer-support/refund-crew
            cli: refund-crew
            seed: 23
            extra: customer-support/refund-resolution-agent
          - dir: customer-support/refund-guarded
            cli: refund-guarded
            seed: 23
            extra: customer-support/refund-resolution-agent
          - dir: customer-support/refund-injected
            cli: refund-injected
            seed: 23
            extra: customer-support/refund-resolution-agent customer-support/refund-guarded
    name: ${{ matrix.cli }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install -e harness[dev]
          for p in ${{ matrix.extra }}; do pip install -e "$p"; done
          pip install -e ${{ matrix.dir }}[dev]
      - name: Tests
        run: pytest harness/tests ${{ matrix.dir }}/tests -q
      - name: Scenario file is reproducible
        if: ${{ matrix.extra == '' }}
        run: |
          ${{ matrix.cli }} generate --n 30 --seed ${{ matrix.seed }} --out /tmp/scenarios.jsonl
          diff /tmp/scenarios.jsonl ${{ matrix.dir }}/evals/scenarios.jsonl
      - name: Mock eval runs green
        run: ${{ matrix.cli }} eval --backend mock --repeats 3 --out /tmp/results
      - name: Lint
        run: ruff check harness ${{ matrix.dir }}
