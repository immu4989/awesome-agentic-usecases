name: Bug / reproducibility issue
description: A result doesn't reproduce, a mock eval fails, or the harness misbehaves.
title: "[bug] <short description>"
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What did you run, and what went wrong?
      placeholder: |
        $ alert-triage-agent eval --backend mock
        ...error / unexpected number...
    validations:
      required: true
  - type: input
    id: usecase
    attributes:
      label: Use case (or "harness")
      placeholder: security-operations/trifecta-exfil-agent
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      description: Python version, OS, and whether you used mock or a real backend.
      placeholder: "Python 3.12, macOS, --backend mistral"
    validations:
      required: true
