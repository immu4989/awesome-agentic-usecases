<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-label="Awesome Agentic Use Cases">
  <rect width="1280" height="640" fill="#1a1a19"/>
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
    <text x="80" y="130" font-size="58" font-weight="700" fill="#ffffff">Awesome <tspan fill="#3987e5">Agentic</tspan> Use Cases</text>
    <text x="80" y="182" font-size="26" fill="#c3c2b7">Agentic AI use cases that are verified, not just runnable.</text>

    <!-- mini results chart -->
    <text x="80" y="266" font-size="19" font-weight="600" fill="#ffffff">Action accuracy · same agent, 4 models, 90 runs each</text>
    <g text-anchor="end" font-size="17" fill="#c3c2b7">
      <text x="268" y="308">kimi-k2p6</text>
      <text x="268" y="356">gpt-oss-120b</text>
      <text x="268" y="404">mistral-small</text>
      <text x="268" y="452">Llama-3.3-70B</text>
    </g>
    <g fill="#3987e5">
      <rect x="288" y="290" width="820" height="26" rx="4"/>
      <rect x="288" y="338" width="638" height="26" rx="4"/>
      <rect x="288" y="386" width="574" height="26" rx="4"/>
      <rect x="288" y="434" width="137" height="26" rx="4"/>
    </g>
    <g font-size="17" font-weight="700" fill="#ffffff">
      <text x="1096" y="309" text-anchor="end">1.000</text>
      <text x="938" y="357">0.778</text>
      <text x="874" y="405">0.700</text>
      <text x="437" y="453">0.167</text>
    </g>

    <!-- stats row -->
    <g stroke="#2c2c2a"><path d="M 80 508 H 1200"/></g>
    <g text-anchor="middle">
      <g fill="#ffffff" font-size="30" font-weight="700">
        <text x="188" y="564">$0.64</text>
        <text x="481" y="564">8</text>
        <text x="774" y="564">n≥3</text>
        <text x="1067" y="564">$0</text>
      </g>
      <g fill="#898781" font-size="15">
        <text x="188" y="592">total eval spend</text>
        <text x="481" y="592">observed failure modes</text>
        <text x="774" y="592">repeats + bootstrap CIs</text>
        <text x="1067" y="592">to reproduce (free tiers)</text>
      </g>
    </g>
  </g>
</svg>
