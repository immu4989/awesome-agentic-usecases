<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="340" viewBox="0 0 1280 340" role="img" aria-label="Action accuracy by model: kimi-k2p6 1.000, gpt-oss-120b 0.778, mistral-small 0.700, Llama-3.3-70B 0.167. Whiskers show 95 percent bootstrap confidence intervals.">
  <rect x="1" y="1" width="1278" height="338" rx="14" fill="#fcfcfb" stroke="rgba(11,11,11,0.10)"/>
  <g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
    <text x="64" y="48" font-size="20" font-weight="700" fill="#0b0b0b">Action accuracy — same agent, same 30-scenario eval, 3 repeats each</text>
    <text x="64" y="72" font-size="14" fill="#898781">exception-triage-agent · whiskers are 95% bootstrap CIs · per-run transcripts committed in results/</text>

    <!-- grid -->
    <g stroke="#e1e0d9"><path d="M 520 90 V 296"/><path d="M 740 90 V 296"/><path d="M 960 90 V 296"/><path d="M 1180 90 V 296"/></g>
    <!-- baseline -->
    <path d="M 300 90 V 296" stroke="#c3c2b7" stroke-width="1.5"/>

    <!-- model labels -->
    <g text-anchor="end">
      <text x="284" y="108" font-size="16" font-weight="600" fill="#0b0b0b">kimi-k2p6</text>
      <text x="284" y="126" font-size="13" fill="#898781">Fireworks · $0.0051/run</text>
      <text x="284" y="163" font-size="16" font-weight="600" fill="#0b0b0b">gpt-oss-120b</text>
      <text x="284" y="181" font-size="13" fill="#898781">Fireworks · $0.0007/run</text>
      <text x="284" y="218" font-size="16" font-weight="600" fill="#0b0b0b">mistral-small</text>
      <text x="284" y="236" font-size="13" fill="#898781">free tier · $0.0004/run</text>
      <text x="284" y="273" font-size="16" font-weight="600" fill="#0b0b0b">Llama-3.3-70B</text>
      <text x="284" y="291" font-size="13" fill="#898781">Together · $0.0012/run</text>
    </g>

    <!-- bars -->
    <g fill="#2a78d6">
      <rect x="300" y="98" width="880" height="24" rx="4"/>
      <rect x="300" y="153" width="685" height="24" rx="4"/>
      <rect x="300" y="208" width="616" height="24" rx="4"/>
      <rect x="300" y="263" width="147" height="24" rx="4"/>
    </g>

    <!-- CI whiskers -->
    <g stroke="#0b0b0b" stroke-opacity="0.45" stroke-width="1.5">
      <path d="M 877 165 H 1082"/><path d="M 877 160 V 170"/><path d="M 1082 160 V 170"/>
      <path d="M 769 220 H 1043"/><path d="M 769 215 V 225"/><path d="M 1043 215 V 225"/>
      <path d="M 349 275 H 554"/><path d="M 349 270 V 280"/><path d="M 554 270 V 280"/>
    </g>

    <!-- value labels -->
    <text x="1170" y="115" font-size="16" font-weight="700" fill="#ffffff" text-anchor="end">1.000</text>
    <text x="1094" y="170" font-size="16" font-weight="700" fill="#0b0b0b">0.778</text>
    <text x="1055" y="225" font-size="16" font-weight="700" fill="#0b0b0b">0.700</text>
    <text x="566" y="280" font-size="16" font-weight="700" fill="#0b0b0b">0.167</text>

    <!-- ticks -->
    <g font-size="13" fill="#898781" text-anchor="middle">
      <text x="300" y="318">0</text>
      <text x="520" y="318">0.25</text>
      <text x="740" y="318">0.50</text>
      <text x="960" y="318">0.75</text>
      <text x="1180" y="318">1.00</text>
    </g>
  </g>
</svg>
