<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="606" viewBox="0 0 1200 606" role="img" aria-label="Decision rules in precedence order for Refund Crew (multi-agent)">
<rect x="1" y="1" width="1198" height="604" rx="14" fill="#fcfcfb" stroke="rgba(11,11,11,0.10)"/>
<g font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
<text x="44" y="46" font-size="19" font-weight="700" fill="#0b0b0b">How the decision is made</text>
<text x="44" y="70" font-size="13" fill="#898781">gates are evaluated in order — the first one that matches wins · <tspan fill="#e34948" font-weight="700">accent = a trap</tspan>, where the obvious reading is wrong</text>
<path d="M 66 122 V 164" stroke="#c3c2b7" stroke-width="1.5"/>
<text x="76" y="158" font-size="11" fill="#898781">no</text>
<circle cx="66" cy="104" r="15" fill="#fcfcfb" stroke="#c3c2b7" stroke-width="1.5"/>
<text x="66" y="109" font-size="14" font-weight="700" text-anchor="middle" fill="#52514e">1</text>
<rect x="104" y="83" width="610" height="42" rx="8" fill="none" stroke="#c3c2b7" stroke-width="1.5"/>
<text x="122" y="109" font-size="15" fill="#0b0b0b">Orchestrator briefs the investigator</text>
<path d="M 722 104 H 748" stroke="#c3c2b7" stroke-width="1.5"/>
<path d="M 748 104 l -7 -4 v 8 z" fill="#c3c2b7"/>
<rect x="762" y="87" width="394" height="34" rx="17" fill="#e1e0d9"/>
<text x="782" y="109" font-size="14" font-weight="600" fill="#0b0b0b">facts come back: identity, account, order</text>
<path d="M 66 200 V 242" stroke="#c3c2b7" stroke-width="1.5"/>
<text x="76" y="236" font-size="11" fill="#898781">no</text>
<circle cx="66" cy="182" r="15" fill="#e34948" stroke="#e34948" stroke-width="1.5"/>
<text x="66" y="187" font-size="14" font-weight="700" text-anchor="middle" fill="#ffffff">2</text>
<rect x="104" y="161" width="610" height="42" rx="8" fill="#e349481a" stroke="#e34948" stroke-width="1.5"/>
<text x="122" y="187" font-size="15" fill="#0b0b0b">🪤  Brief omits a deciding fact?</text>
<path d="M 722 182 H 748" stroke="#c3c2b7" stroke-width="1.5"/>
<path d="M 748 182 l -7 -4 v 8 z" fill="#c3c2b7"/>
<rect x="762" y="165" width="394" height="34" rx="17" fill="#e1e0d9"/>
<text x="782" y="187" font-size="14" font-weight="600" fill="#0b0b0b">compliance rules on what it was shown</text>
<path d="M 66 278 V 320" stroke="#c3c2b7" stroke-width="1.5"/>
<text x="76" y="314" font-size="11" fill="#898781">no</text>
<circle cx="66" cy="260" r="15" fill="#fcfcfb" stroke="#c3c2b7" stroke-width="1.5"/>
<text x="66" y="265" font-size="14" font-weight="700" text-anchor="middle" fill="#52514e">3</text>
<rect x="104" y="239" width="610" height="42" rx="8" fill="none" stroke="#c3c2b7" stroke-width="1.5"/>
<text x="122" y="265" font-size="15" fill="#0b0b0b">Compliance reviews the proposed action</text>
<path d="M 722 260 H 748" stroke="#c3c2b7" stroke-width="1.5"/>
<path d="M 748 260 l -7 -4 v 8 z" fill="#c3c2b7"/>
<rect x="762" y="243" width="394" height="34" rx="17" fill="#e1e0d9"/>
<text x="782" y="265" font-size="14" font-weight="600" fill="#0b0b0b">approve, or veto</text>
<path d="M 66 356 V 398" stroke="#c3c2b7" stroke-width="1.5"/>
<text x="76" y="392" font-size="11" fill="#898781">no</text>
<circle cx="66" cy="338" r="15" fill="#e34948" stroke="#e34948" stroke-width="1.5"/>
<text x="66" y="343" font-size="14" font-weight="700" text-anchor="middle" fill="#ffffff">4</text>
<rect x="104" y="317" width="610" height="42" rx="8" fill="#e349481a" stroke="#e34948" stroke-width="1.5"/>
<text x="122" y="343" font-size="15" fill="#0b0b0b">🪤  Veto ignored by the orchestrator?</text>
<path d="M 722 338 H 748" stroke="#c3c2b7" stroke-width="1.5"/>
<path d="M 748 338 l -7 -4 v 8 z" fill="#c3c2b7"/>
<rect x="762" y="321" width="394" height="34" rx="17" fill="#e1e0d9"/>
<text x="782" y="343" font-size="14" font-weight="600" fill="#0b0b0b">the payout happens anyway</text>
<path d="M 66 434 V 476" stroke="#c3c2b7" stroke-width="1.5"/>
<text x="76" y="470" font-size="11" fill="#898781">no</text>
<circle cx="66" cy="416" r="15" fill="#e34948" stroke="#e34948" stroke-width="1.5"/>
<text x="66" y="421" font-size="14" font-weight="700" text-anchor="middle" fill="#ffffff">5</text>
<rect x="104" y="395" width="610" height="42" rx="8" fill="#e349481a" stroke="#e34948" stroke-width="1.5"/>
<text x="122" y="421" font-size="15" fill="#0b0b0b">🪤  Every delegation is a handoff</text>
<path d="M 722 416 H 748" stroke="#c3c2b7" stroke-width="1.5"/>
<path d="M 748 416 l -7 -4 v 8 z" fill="#c3c2b7"/>
<rect x="762" y="399" width="394" height="34" rx="17" fill="#e1e0d9"/>
<text x="782" y="421" font-size="14" font-weight="600" fill="#0b0b0b">some models treat that as finishing</text>
<circle cx="66" cy="494" r="15" fill="#fcfcfb" stroke="#c3c2b7" stroke-width="1.5"/>
<text x="66" y="499" font-size="14" font-weight="700" text-anchor="middle" fill="#52514e">6</text>
<rect x="104" y="473" width="610" height="42" rx="8" fill="none" stroke="#c3c2b7" stroke-width="1.5"/>
<text x="122" y="499" font-size="15" fill="#0b0b0b">Orchestrator closes the ticket</text>
<path d="M 722 494 H 748" stroke="#c3c2b7" stroke-width="1.5"/>
<path d="M 748 494 l -7 -4 v 8 z" fill="#c3c2b7"/>
<rect x="762" y="477" width="394" height="34" rx="17" fill="#e1e0d9"/>
<text x="782" y="499" font-size="14" font-weight="600" fill="#0b0b0b">resolution committed</text>
</g>
</svg>
